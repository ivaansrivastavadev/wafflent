<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/assets/roundedlogo.gif">
  <title>Wafflent Chat</title>
  <link rel="stylesheet" href="/app/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .lcg-page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Layout ── */
    .lcg-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 48px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header ── */
    .lcg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ── Device ID pill — clickable ── */
    .lcg-device-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: var(--r-pill);
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      font-size: var(--text-xs);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease);
      user-select: none;
    }
    .lcg-device-pill:hover { border-color: var(--accent); color: var(--accent); }
    .lcg-device-pill .mono {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── Chat box ── */
    .lcg-chat {
      height: min(55vh, 520px);
      overflow-y: auto;
      padding: 16px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .lcg-chat:empty::before {
      content: 'No messages yet. Join a room and start chatting.';
      color: var(--text-tertiary);
      font-size: var(--text-sm);
      text-align: center;
      margin: auto;
    }

    /* ── Messages ── */
    .lcg-msg {
      max-width: min(75%, 320px);
      min-width: 120px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 18px;
      border: 1px solid transparent;
      word-break: break-word;
      animation: lcg-pop 150ms var(--ease-spring);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    @keyframes lcg-pop {
      from { opacity: 0; transform: scale(0.94) translateY(4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .lcg-msg.me {
      background: var(--accent);
      color: var(--text-on-accent);
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }
    .lcg-msg.them {
      background: var(--bg-elevated);
      border-color: var(--border);
      color: var(--text-primary);
      border-bottom-left-radius: 5px;
    }
    .lcg-msg.system {
      background: transparent;
      border-color: transparent;
      color: var(--text-tertiary);
      font-size: var(--text-xs);
      text-align: center;
      margin: 0 auto;
      padding: 2px 8px;
      flex-direction: row;
    }
    
    /* Message content styling */
    .lcg-msg-content {
      line-height: 1.4;
    }
    
    /* Message metadata styling */
    .lcg-msg-meta {
      font-size: 10px;
      opacity: 0.65;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .lcg-msg.me .lcg-msg-meta { 
      justify-content: flex-end;
    }
    .lcg-msg.them .lcg-msg-meta { 
      justify-content: flex-start;
    }
    
    /* Message status indicator */
    .msg-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 2px;
      transition: color 200ms ease;
    }
    .msg-status i {
      display: inline-block;
    }
    
    /* Inline metadata for short messages */
    .lcg-msg.inline-meta {
      flex-direction: row;
      align-items: baseline;
      gap: 8px;
    }
    .lcg-msg.inline-meta .lcg-msg-meta {
      margin-top: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* For ALL messages, content first, then metadata */
    .lcg-msg.inline-meta.me,
    .lcg-msg.inline-meta.them {
      flex-direction: row;
    }

    /* ── Image message ── */
    .lcg-msg-img {
      max-width: 240px;
      border-radius: var(--r-md);
      display: block;
      margin-bottom: 4px;
      cursor: pointer;
    }

    /* ── Typing indicator ── */

    /* ── Audio player ── */
    .lcg-msg-audio {
      border-radius: var(--r-md);
      display: block;
      margin-bottom: 4px;
      width: 100%;
      max-width: 320px;
    }

    /* ── Scroll down button ── */
    #scrollDownBtn {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .lcg-typing {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      min-height: 18px;
      padding: 0 4px;
      transition: opacity var(--dur-fast);
    }

    /* ── Input bar ── */
    .lcg-inputbar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .lcg-inputbar textarea {
      min-height: 48px;
      max-height: 140px;
      resize: vertical;
      flex: 1;
    }
    .lcg-input-actions {
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: flex-end;
    }

    /* ── File attach button ── */
    .lcg-attach {
      width: 44px; height: 44px;
      border-radius: var(--r-pill);
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      font-size: 15px;
      flex-shrink: 0;
    }
    .lcg-attach:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

    /* ── Peer status dot ── */
    .lcg-peer-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-tertiary);
      display: inline-block;
      transition: background var(--dur-mid) var(--ease);
      flex-shrink: 0;
    }
    .lcg-peer-dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(76,175,80,0.5); }

    /* ── Row / grow helpers ── */
    .lcg-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .lcg-grow { flex: 1 1 220px; }

    /* ── Toast ── */
    .lcg-toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--bg-overlay);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--dur-mid) var(--ease), transform var(--dur-mid) var(--ease);
      pointer-events: none;
    }
    .lcg-toast.show { opacity: 1; transform: translateY(0); }

    /* ── Image lightbox ── */
    .lcg-lightbox {
      position: fixed; inset: 0;
      background: rgba(10,9,7,0.88);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lcg-lightbox.open { display: flex; }
    .lcg-lightbox img { max-width: 100%; max-height: 90vh; border-radius: var(--r-lg); }
    .lcg-lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 50%; width: 36px; height: 36px;
      color: var(--text-primary); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── QR Code Modal ── */
    .lcg-qr-modal {
      position: fixed; inset: 0;
      background: rgba(10,9,7,0.88);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lcg-qr-modal.open { display: flex; }
    
    .lcg-qr-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      position: relative;
      animation: wf-slide-up var(--dur-slow) var(--ease-spring);
    }
    
    .lcg-qr-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 50%; width: 32px; height: 32px;
      color: var(--text-primary); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
    }
    .lcg-qr-close:hover {
      background: var(--error-subtle);
      color: var(--error);
      border-color: var(--error);
    }

    /* ── Message Context Menu ── */
    .msg-context-menu {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      z-index: 500;
      display: none;
      min-width: 180px;
      overflow: hidden;
      animation: msg-menu-appear 150ms var(--ease);
    }
    
    .msg-context-menu.open {
      display: flex;
      flex-direction: column;
    }
    
    @keyframes msg-menu-appear {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes msg-disappear {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); }
    }
    
    .msg-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease);
      border: none;
      background: none;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: var(--text-sm);
      text-align: left;
      width: 100%;
    }
    
    .msg-menu-item:hover {
      background: var(--bg-overlay);
      color: var(--text-primary);
    }
    
    .msg-menu-item.danger:hover {
      background: var(--error-subtle);
      color: var(--error);
    }
    
    .msg-menu-item i {
      font-size: 14px;
      opacity: 0.7;
    }
    
    .msg-menu-separator {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    
    /* Emoji Picker */
    .emoji-picker {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-lg);
      z-index: 500;
      display: none;
      padding: 8px;
      min-width: 280px;
      max-width: 320px;
      animation: msg-menu-appear 150ms var(--ease);
    }
    
    .emoji-picker.open {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    
    .emoji-btn {
      width: 40px;
      height: 40px;
      font-size: 20px;
      background: none;
      border: 1px solid transparent;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .emoji-btn:hover {
      background: var(--bg-overlay);
      border-color: var(--border);
      transform: scale(1.1);
    }
    
    /* Message reactions container */
    .msg-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    
    .reaction-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
    }
    
    .reaction-badge:hover {
      background: var(--bg-elevated);
      border-color: var(--accent);
    }
    
    .reaction-emoji {
      font-size: 14px;
    }
    
    .reaction-count {
      font-size: 11px;
      color: var(--text-tertiary);
      min-width: 12px;
      text-align: center;
    }

    @media (max-width: 600px) {

      .lcg-input-actions { flex-direction: row; }
    }
  </style>
</head>
<body>
<div class="lcg-page">
  <div class="lcg-wrap">

    <!-- ═══════════ HEADER ═══════════ -->
    <div class="lcg-header">
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <h1 class="wf-h2" style="margin:0;">Wafflent</h1>
      </div>
      <!-- Device ID pill — click to rename -->
      <div class="lcg-device-pill" id="devicePill" title="Click to set your display name">
        <i class="fas fa-fingerprint"></i>
        <span id="deviceName">—</span>
        &nbsp;<span style="opacity:0.4;">·</span>&nbsp;
        <span class="mono" id="deviceIdShort"></span>
        <i class="fas fa-pencil" style="font-size:9px; margin-left:2px; opacity:0.5;"></i>
      </div>
    </div>

    <!-- ═══════════ ROOM CONFIG ═══════════ -->
    <div class="wf-card">
      <form id="roomConfigForm">
        <div class="lcg-row">
          <div class="lcg-grow wf-form-group">
            <label class="wf-label">chat id <span style="opacity:0.5;">(share with your friend)</span></label>
            <div class="wf-input-wrapper">
              <span class="wf-input-icon-left"><i class="fas fa-door-open" style="font-size:12px;"></i></span>
              <input id="room" class="wf-input has-icon-left" style="font-family:monospace;" placeholder="e.g. yellow-tiger-8291" />
            </div>
          </div>
          <div class="lcg-grow wf-form-group">
            <label class="wf-label">secret <span style="opacity:0.5;">(optional — E2E encrypts messages)</span></label>
            <div class="wf-input-wrapper">
              <span class="wf-input-icon-left"><i class="fas fa-key" style="font-size:12px;"></i></span>
              <input id="secret" type="password" class="wf-input has-icon-left" placeholder="shared passphrase" />
            </div>
           </div>
         </div>

         <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:16px;">
          <button id="join" type="button" class="wf-btn wf-btn-filled"><i class="fas fa-right-to-bracket"></i>&nbsp; Join / Create</button>
          <button id="copyLink" type="button" class="wf-btn wf-btn-outlined"><i class="fas fa-link"></i>&nbsp; Copy Invite</button>
          <button id="clearBtn" type="button" class="wf-btn wf-btn-ghost" style="color:var(--error);"><i class="fas fa-broom"></i>&nbsp; Clear Chat</button>
          <div style="display:flex; align-items:center; gap:7px; margin-left:auto; font-size:var(--text-xs); color:var(--text-tertiary);">
            <span class="lcg-peer-dot" id="peerDot"></span>
            <span id="peerStatus">Connecting…</span>
          </div>
        </div>
      </form>
    </div>

    <!-- ═══════════ CHAT ═══════════ -->
    <div class="wf-card" style="padding:0; overflow:hidden;">

      <!-- Room status -->
      <!-- Room status -->
      <div style="padding:8px 16px; background:var(--bg-elevated); border-bottom:1px solid var(--border); font-size:var(--text-xs); color:var(--text-secondary); display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <span id="roomHint">No room joined</span>
        <button id="shareQRBtn" class="wf-btn-icon sm" title="Show QR code to share room" style="display:none; background:none; border:none; color:var(--accent); flex-shrink:0;">
          <i class="fas fa-qrcode"></i>
        </button>
      </div>

      <!-- Chat area (with scroll button) -->
      <div style="position:relative;">
        <div id="chat" class="lcg-chat"></div>
        <button id="scrollDownBtn" class="wf-btn-icon sm" title="Scroll to latest message" style="position:absolute; bottom:16px; left:16px; display:none; z-index:10;">
          <i class="fas fa-chevron-down"></i>
        </button>
      </div>

      <!-- Input -->
      <div style="padding:14px 16px; border-top:1px solid var(--border);">
        <div class="lcg-inputbar">
          <button id="stickerBtn" class="wf-btn-icon sm" title="Add sticker" style="flex-shrink:0;">
            <i class="fas fa-face-smile"></i>
          </button>
          <textarea id="text" class="wf-input" placeholder="type a message…"></textarea>
          <div class="lcg-input-actions">
            <!-- Attachment button -->
            <label class="lcg-attach" title="Send attachment">
              <i class="fas fa-paperclip"></i>
              <input type="file" id="fileInput" style="display:none;">
            </label>
            <button id="send" class="wf-btn wf-btn-filled" style="width:44px; height:44px; flex-shrink:0; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center;">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /wrap -->

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer style="padding:24px 0; border-top:1px solid var(--border); text-align:center;">
    <div class="wf-container">
      <p class="wf-caption" style="color:var(--text-tertiary);">Wafflent © 2026 Wafflent</p>
    </div>
  </footer>

</div><!-- /lcg-page -->

<!-- Lightbox -->
<div class="lcg-lightbox" id="lightbox">
  <button class="lcg-lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="Full size">
</div>

<!-- Toast -->
<div class="lcg-toast" id="toast"></div>

<!-- QR Code Modal -->
<div class="lcg-qr-modal" id="qrModal">
  <div class="lcg-qr-container">
    <button class="lcg-qr-close" id="qrClose">✕</button>
    <h2 style="margin: 0 0 16px 0; color: var(--text-primary); font-size: var(--text-xl); font-weight: 700;">Join via QR Code</h2>
    
    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
      <!-- QR Code will be inserted here -->
      <div id="qrContainer" style="background: white; padding: 12px; border-radius: var(--r-md);"></div>
      
      <!-- Favicon + Room ID -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;">
        <img src="/assets/favicon.ico" alt="Wafflent" style="width: 32px; height: 32px; border-radius: var(--r-sm);">
        <div style="color: var(--text-secondary); font-size: var(--text-sm);">
          <div style="color: var(--text-tertiary); font-size: var(--text-xs); margin-bottom: 4px;">Room ID</div>
          <div id="qrRoomId" style="font-family: monospace; font-weight: 600; color: var(--accent);"></div>
        </div>
      </div>
      
      <!-- Instructions -->
      <p style="color: var(--text-secondary); font-size: var(--text-sm); margin: 0; text-align: center;">
        Scan this QR code or share the room ID above
      </p>
    </div>
  </div>
</div>

<!-- Message Context Menu -->
<div class="msg-context-menu" id="msgContextMenu">
  <button class="msg-menu-item" id="editMsgBtn" title="Edit this message">
    <i class="fas fa-pencil"></i>
    <span>Edit</span>
  </button>
  <button class="msg-menu-item" id="copyMsgBtn" title="Copy message text">
    <i class="fas fa-copy"></i>
    <span>Copy</span>
  </button>
  <button class="msg-menu-item" id="deleteMsgBtn" danger title="Delete this message">
    <i class="fas fa-trash"></i>
    <span>Delete</span>
  </button>
  <div class="msg-menu-separator"></div>
  <button class="msg-menu-item" id="reactMsgBtn" title="Add reaction">
    <i class="fas fa-face-smile"></i>
    <span>React</span>
  </button>
</div>

<!-- Emoji Picker -->
<div class="emoji-picker" id="emojiPicker">
  <!-- Emojis will be generated by JavaScript -->
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/axe.js"></script>

<!-- App modules (load in order) -->
<script src="/app/utils.js"></script>
<script src="/app/p2p.js"></script>
<script src="/app/chat.js"></script>
<script src="/app/messages.js"></script>
<script src="/app/ui.js"></script>
<script src="/app/script.js"></script>
</body>
</html>
