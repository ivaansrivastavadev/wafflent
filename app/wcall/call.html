<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
  <title>Wafflent Calls</title>
  <link rel="stylesheet" href="/app/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .wcall-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      color: var(--text-primary);
    }

    /* ─── Header ─── */
    .wcall-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .wcall-header h1 {
      margin: 0;
      font-size: var(--text-lg);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wcall-status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--bg-base);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    .wcall-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: background 200ms ease;
    }

    .wcall-status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
    }

    /* ─── Main Content ─── */
    .wcall-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ─── Room Entry Form ─── */
    .wcall-form-container {
      width: 100%;
      max-width: 420px;
      padding: 32px 28px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      animation: wf-slide-up var(--dur-slow) var(--ease-spring);
    }

    .wcall-form-header {
      margin-bottom: 24px;
    }

    .wcall-form-header h2 {
      margin: 0 0 8px 0;
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .wcall-form-header p {
      margin: 0;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .wcall-form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .wcall-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
    }

    .wcall-input {
      width: 100%;
      padding: 12px 14px;
      font-size: var(--text-sm);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all var(--dur-fast) var(--ease);
    }

    .wcall-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-elevated);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .wcall-input::placeholder {
      color: var(--text-disabled);
    }

    .wcall-input-hint {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: -8px;
    }

    .wcall-button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .wcall-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: var(--r-md);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    .wcall-btn-primary {
      background: var(--accent);
      color: var(--accent-text);
    }

    .wcall-btn-primary:hover {
      background: var(--accent-dim);
      box-shadow: var(--shadow-accent);
    }

    .wcall-btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }

    .wcall-btn-secondary:hover {
      border-color: var(--accent);
      background: var(--bg-overlay);
    }

    /* ─── Call Interface ─── */
    .wcall-interface {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: wf-slide-up var(--dur-slow) var(--ease-spring);
    }

    .wcall-call-info {
      text-align: center;
    }

    .wcall-call-info h2 {
      margin: 0 0 8px 0;
      font-size: var(--text-2xl);
      font-weight: 700;
    }

    .wcall-call-info p {
      margin: 0;
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .wcall-call-duration {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--accent);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      margin-top: 12px;
    }

    /* ─── Call Controls ─── */
    .wcall-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .wcall-control-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 2px solid var(--border);
    }

    .wcall-control-btn:hover:not(:disabled) {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .wcall-control-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .wcall-control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .wcall-control-btn.mic-off {
      background: var(--error-subtle);
      border-color: var(--error);
      color: var(--error);
    }

    .wcall-control-btn.mic-off:hover {
      background: var(--error);
      color: white;
    }

    .wcall-control-btn.hang-up {
      background: var(--error-subtle);
      border-color: var(--error);
      color: var(--error);
      width: 80px;
      height: 80px;
      font-size: 32px;
    }

    .wcall-control-btn.hang-up:hover {
      background: var(--error);
      color: white;
    }

    /* ─── Device Selection ─── */
    .wcall-devices {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 16px;
    }

    .wcall-devices-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      font-weight: 600;
    }

    .wcall-devices-select {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
    }

    .wcall-devices-select:hover {
      border-color: var(--accent);
    }

    .wcall-devices-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    /* ─── Hidden State ─── */
    .wcall-hidden {
      display: none !important;
    }

    @keyframes wf-slide-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Animations ─── */
    @keyframes pulse-call {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .wcall-control-btn.active {
      animation: pulse-call 2s ease-in-out infinite;
    }

    @media (max-width: 600px) {
      .wcall-form-container {
        padding: 24px 20px;
      }

      .wcall-control-btn {
        width: 56px;
        height: 56px;
        font-size: 20px;
      }

      .wcall-control-btn.hang-up {
        width: 72px;
        height: 72px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
<div class="wcall-page">
  <!-- Header -->
  <div class="wcall-header">
    <h1>
      <i class="fas fa-phone"></i>
      Wafflent Calls
    </h1>
    <div class="wcall-status-indicator">
      <span class="wcall-status-dot" id="wcallStatusDot"></span>
      <span id="wcallStatus">Offline</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="wcall-container">
    <!-- Room Entry Form -->
    <div id="wcallForm" class="wcall-form-container">
      <div class="wcall-form-header">
        <h2>Start a Call</h2>
        <p>Enter a room ID to connect with others</p>
      </div>

      <!-- Room ID Input -->
      <div class="wcall-form-group">
        <label class="wcall-label" for="wcallRoomId">Room ID</label>
        <input
          type="text"
          id="wcallRoomId"
          class="wcall-input"
          placeholder="e.g. yellow-tiger-8291"
          autocomplete="off"
        />
        <div class="wcall-input-hint">Share this ID with someone to call them</div>
      </div>

      <!-- Encryption Toggle -->
      <div class="wcall-form-group">
        <label class="wcall-label" for="wcallSecret">Encryption (Optional)</label>
        <input
          type="password"
          id="wcallSecret"
          class="wcall-input"
          placeholder="shared passphrase"
          autocomplete="off"
        />
        <div class="wcall-input-hint">Leave empty for no encryption</div>
      </div>

      <!-- Device Selection -->
      <div class="wcall-devices">
        <div class="wcall-devices-label">Microphone Device</div>
        <select id="wcallAudioDeviceSelect" class="wcall-devices-select">
          <option value="">Default</option>
        </select>
      </div>

      <!-- Action Buttons -->
      <div class="wcall-button-group">
        <button id="wcallJoinBtn" class="wcall-btn wcall-btn-primary">
          <i class="fas fa-phone-alt"></i>
          Join Call
        </button>
      </div>
    </div>

    <!-- Call Interface -->
    <div id="wcallInterface" class="wcall-interface wcall-hidden">
      <!-- Call Info -->
      <div class="wcall-call-info">
        <h2 id="wcallRemoteName">Waiting for connection...</h2>
        <p id="wcallCallStatus">Connecting</p>
        <div class="wcall-call-duration">
          <span id="wcallCallDuration">00:00</span>
        </div>
      </div>

      <!-- Call Controls -->
      <div class="wcall-controls">
        <!-- Mic Toggle -->
        <button id="wcallMicBtn" class="wcall-control-btn" title="Toggle microphone">
          <i class="fas fa-microphone"></i>
        </button>

        <!-- Hang Up -->
        <button id="wcallHangUpBtn" class="wcall-control-btn wcall-control-btn-hang-up hang-up" title="End call">
          <i class="fas fa-phone-slash"></i>
        </button>
      </div>

      <!-- Device Selection During Call -->
      <div class="wcall-devices">
        <div class="wcall-devices-label">Microphone Device</div>
        <select id="wcallAudioDeviceDuringCall" class="wcall-devices-select">
          <option value="">Default</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/axe.js"></script>

<!-- Utils from main app -->
<script>
  // Simple helper function
  function $(id) {
    return document.getElementById(id);
  }

  // Toast function
  function toast(message, duration = 3000) {
    const existing = document.getElementById('toast');
    if (existing) {
      existing.textContent = message;
      existing.classList.add('show');
    } else {
      const el = document.createElement('div');
      el.id = 'toast';
      el.className = 'lcg-toast show';
      el.textContent = message;
      el.style.cssText = `
        position: fixed;
        bottom: auto;
        top: 80px;
        right: 24px;
        background: var(--bg-overlay);
        color: var(--text-primary);
        border: 1px solid var(--border);
        padding: 10px 18px;
        border-radius: var(--r-pill);
        font-size: var(--text-sm);
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        z-index: 999;
        animation: slideIn 200ms ease;
      `;
      document.body.appendChild(el);
    }
    setTimeout(() => {
      if ($('toast')) {
        $('toast').classList.remove('show');
      }
    }, duration);
  }
</script>

<!-- Call Interface Script -->
<script src="/app/wcall/call.js"></script>
</body>
</html>
